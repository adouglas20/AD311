<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Game Finder</title>
    <style>
        body { font-family: sans-serif; background: #1b2838; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .search-container { margin-bottom: 30px; }
        input { padding: 10px; width: 250px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #66c0f4; border: none; border-radius: 4px; color: white; font-weight: bold; }
        #game-card { background: #2a475e; padding: 20px; border-radius: 8px; max-width: 500px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        img { width: 100%; border-radius: 4px; }
        .price { font-size: 1.5rem; color: #a3d200; }
    </style>
</head>
<body>

    <h1>Steam Game Explorer</h1>
    <div class="search-container">
        <input type="text" id="appIdInput" placeholder="Enter Steam AppID (e.g. 400)">
        <button onclick="searchGame()">Search</button>
    </div>

    <div id="game-card">
        <h2 id="title"></h2>
        <img id="banner" src="" alt="Game Banner">
        <p id="description"></p>
        <p class="price" id="price"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
